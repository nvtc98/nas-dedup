<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAS Dedup</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body>
  <div id="app">
    <header>
      <div id="header-top">
        <h1>NAS Duplicate Checker</h1>
        <div id="user-info">
          <span id="username-display"></span>
          <button id="logout-btn">Đăng xuất</button>
        </div>
      </div>
      <div id="steps">
        <span class="step active" id="step-label-1">① Configure</span>
        <span class="step" id="step-label-2">② Scanning</span>
        <span class="step" id="step-label-3">③ Review</span>
      </div>
    </header>

    <!-- Step 1: Configure -->
    <section id="step-1">
      <label for="dir-input">Thư mục cần scan</label>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input type="text" id="dir-input" placeholder="~/Photos" style="margin-bottom:0;flex:1">
        <button id="browse-btn" style="white-space:nowrap;background:#6b7280"><i class="ph ph-folder-open"></i> Duyệt</button>
      </div>
      <div id="folder-browser" hidden>
        <div id="browser-path" style="font-size:0.8rem;color:#555;margin-bottom:6px;padding:6px 8px;background:#f5f5f5;border-radius:4px"></div>
        <div id="browser-list" style="border:1px solid #ddd;border-radius:6px;max-height:220px;overflow-y:auto"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="browser-select-btn"><i class="ph ph-check"></i> Chọn thư mục này</button>
          <button id="browser-cancel-btn" style="background:#6b7280"><i class="ph ph-x"></i> Hủy</button>
        </div>
      </div>
      <label style="color:#aaa;margin-top:8px">
        <input type="checkbox" id="perceptual-toggle" disabled>
        Tìm ảnh trông giống nhau (perceptual hash) — chưa hỗ trợ
      </label>
      <button id="start-btn" style="margin-top:12px"><i class="ph ph-play"></i> Bắt đầu Scan</button>
    </section>

    <!-- Step 2: Scanning -->
    <section id="step-2" hidden>
      <p id="progress-text">Đang scan...</p>
      <progress id="progress-bar" value="0" max="100"></progress>
    </section>

    <!-- Step 3: Review -->
    <section id="step-3" hidden>
      <div id="summary-bar">
        <span id="summary-text"></span>
        <div id="toolbar">
          <select id="folder-filter"><option value="">Tất cả thư mục</option></select>
          <label>
            <input type="checkbox" id="select-folder-all">
            Chọn tất cả trong thư mục này
          </label>
          <button id="delete-btn" disabled><i class="ph ph-trash"></i> Xóa đã chọn (0)</button>
          <button id="rescan-btn" style="background:#6b7280"><i class="ph ph-arrow-counter-clockwise"></i> Bắt đầu lại</button>
        </div>
      </div>
      <div id="results-container">
        <table id="results-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="select-all"></th>
              <th>File</th>
              <th>Nhóm</th>
              <th>Kích thước</th>
              <th>Ngày sửa</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
      <div id="delete-result" hidden></div>
    </section>
  </div>

  <!-- Image preview modal -->
  <div id="preview-modal" hidden>
    <div id="preview-backdrop"></div>
    <div id="preview-box">
      <button id="preview-close"><i class="ph ph-x"></i></button>
      <img id="preview-img" src="" alt="">
      <p id="preview-name"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
