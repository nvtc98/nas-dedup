<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAS Dedup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div id="header-top">
        <h1>NAS Duplicate Checker</h1>
        <div id="user-info">
          <span id="username-display"></span>
          <button id="logout-btn">Đăng xuất</button>
        </div>
      </div>
      <div id="steps">
        <span class="step active" id="step-label-1">① Configure</span>
        <span class="step" id="step-label-2">② Scanning</span>
        <span class="step" id="step-label-3">③ Review</span>
      </div>
    </header>

    <!-- Step 1: Configure -->
    <section id="step-1">
      <label for="dir-input">Thư mục cần scan</label>
      <input type="text" id="dir-input" placeholder="/volume1/homes/user/Photos">
      <label style="color: #aaa;">
        <input type="checkbox" id="perceptual-toggle" disabled>
        Tìm ảnh trông giống nhau (perceptual hash) — chưa hỗ trợ
      </label>
      <button id="start-btn">▶ Bắt đầu Scan</button>
    </section>

    <!-- Step 2: Scanning -->
    <section id="step-2" hidden>
      <p id="progress-text">Đang scan...</p>
      <progress id="progress-bar" value="0" max="100"></progress>
    </section>

    <!-- Step 3: Review -->
    <section id="step-3" hidden>
      <div id="summary-bar">
        <span id="summary-text"></span>
        <div id="toolbar">
          <select id="folder-filter"><option value="">Tất cả thư mục</option></select>
          <label>
            <input type="checkbox" id="select-folder-all">
            Chọn tất cả trong thư mục này
          </label>
          <button id="delete-btn" disabled>🗑 Xóa đã chọn (0)</button>
        </div>
      </div>
      <div id="results-container">
        <table id="results-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="select-all"></th>
              <th>File</th>
              <th>Nhóm</th>
              <th>Kích thước</th>
              <th>Ngày sửa</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
      <div id="delete-result" hidden></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
